  - {type: variant, offset: 6935, length: 118, content: '此卷第三紙第二十行，cf. p. 406a [03]cf. p. 406a [03]月離女星之上，丹藏有注云：脫牛宿。挍曰：下此注者曾未知西域唯用二十七宿。凡言脫者，言其容有而無。彼本不用，經無理然。何云脫耶？如孰函文殊師利宿曜經中，凡有七段重明宿曜，段段唯有二十七宿而無牛宿。景風注云：唐用二十八宿，西國除牛宿，以其天主事之。斯其證也', 宋: '', 元: '', 明: ''}
